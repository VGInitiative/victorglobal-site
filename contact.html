<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Victor Global Initiative</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" 
      href="https://unpkg.com/aos@2.3.1/dist/aos.css" 
      integrity="sha384-p86U60I6L8V6oD4R4uW4N4M4f4L4U4k4S4T4O4R4i4N4G4H4t4M4l4O4p4S4D4I" 
      crossorigin="anonymous">

    <style>
        /* --- MASTER CSS --- */
        :root {
            --primary: #0a7d8c; 
            --secondary: #32c6a6;
            --dark: #222;
            --light: #f4f7f8;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            line-height: 1.6; 
            color: var(--dark); 
            background: var(--white);
            overflow-x: hidden;
        }

        /* Nav & Footer Styles (Required in main page for injected content) */
        header { background: var(--primary); padding: 15px 0; position: sticky; top: 0; z-index: 2000; box-shadow: var(--shadow); }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; padding: 0 20px; }
        .brand { display: flex; align-items: center; text-decoration: none; color: white; }
        .logo { height: 50px; margin-right: 15px; }
        .org-title { font-size: 1.2rem; font-weight: 700; }
        nav { display: flex; align-items: center; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        nav a:hover, nav a.active-link { color: var(--secondary); }
        .donate-btn-nav { background: var(--secondary); padding: 8px 20px; border-radius: 50px; }
        .hamburger { display: none; font-size: 1.8rem; color: white; cursor: pointer; }

        /* Contact Page Content */
        .section-padding { padding: 100px 20px; max-width: 1200px; margin: auto; text-align: center; }
        .subtitle { display: block; text-transform: uppercase; color: var(--secondary); font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
        .lead-text { font-size: 1.2rem; max-width: 700px; margin: 20px auto 40px; color: #555; }
        
        .contact-cta-area { margin: 40px 0; }
        .contact-button { 
            background: var(--primary); 
            color: white; 
            padding: 20px 45px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(10, 125, 140, 0.2);
        }
        .contact-button:hover { background: var(--secondary); transform: translateY(-3px); box-shadow: var(--shadow); }

        .alt-contact { margin-top: 60px; padding-top: 40px; border-top: 1px solid #eee; }
        .alt-contact p { margin-bottom: 15px; font-size: 1.05rem; }
        .alt-contact a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* Footer Alignment */
        footer { background: #1a1a1a; color: #bbb; padding: 60px 20px 30px; font-size: 0.85rem; }
        .footer-container { max-width: 1100px; margin: 0 auto; }
        .footer-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; border-bottom: 1px solid #333; padding-bottom: 40px; text-align: left; }
        .footer-bottom { padding-top: 30px; text-align: center; }
        .legal-disclaimer { font-size: 0.7rem; color: #777; margin-top: 15px; }

        @media (max-width: 900px) {
            .hamburger { display: block; }
            nav { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; width: 100%; background: var(--primary); padding: 20px 0; text-align: center; }
            nav.active { display: flex; }
            nav a { margin: 10px 0; margin-left: 0; }
            .footer-top { text-align: center; }
            .section-padding { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section class="section-padding contact-page" data-aos="fade-up">
            <div class="container">
                <span class="subtitle">Get in Touch</span>
                <h1>Connect With VGI</h1>
                <p class="lead-text">
                    To ensure your message reaches us directly, please use our secure 
                    Microsoft partnership form below. 
                </p>
                
                <div class="contact-cta-area">
                    <a href="https://forms.office.com/r/Ve1thcJPT5?origin=lprLink" class="contact-button" target="_blank">
                        Open Secure Contact Form
                    </a>
                </div>
                
                <div class="alt-contact">
                    <p>Prefer email? Reach us at <a href="mailto:info@victorglobal.org">info@victorglobal.org</a></p>
                    <p><strong>Phone:</strong> (760) 842-8677</p>
                    <p><strong>Office:</strong> 11507 Dr MLK Blvd Unit 34, Mango, FL 33550</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

   <link rel="stylesheet" 
      href="https://unpkg.com/aos@2.3.1/dist/aos.css" 
      integrity="sha384-p86U60I6L8V6oD4R4uW4N4M4f4L4U4k4S4T4O4R4i4N4G4H4t4M4l4O4p4S4D4I" 
      crossorigin="anonymous">
      
    <script>
        async function loadComponents() {
            try {
                // Fetch and inject Header
                const headerResp = await fetch('header.html');
                const headerHTML = await headerResp.text();
                document.getElementById('header-placeholder').innerHTML = headerHTML;
                
                // Fetch and inject Footer
                const footerResp = await fetch('footer.html');
                const footerHTML = await footerResp.text();
                document.getElementById('footer-placeholder').innerHTML = footerHTML;
                
                // Initialize AOS animations after content is ready
                AOS.init({ duration: 1000, once: true });

                // Highlight Active Link (optional if you want highlight on legal/contact pages)
                const links = document.querySelectorAll('nav a');
                links.forEach(link => {
                    if(link.getAttribute('href') === 'contact.html') {
                        link.classList.add('active-link');
                    }
                });

            } catch (err) {
                console.error("Component loading failed:", err);
            }
        }

        // Mobile Navigation Toggle (Global scope)
        function toggleMenu() {
            const nav = document.getElementById('nav-menu');
            if(nav) nav.classList.toggle('active');
        }

        // Initialize on Load
        window.onload = loadComponents;
    </script>
</body>
</html>
