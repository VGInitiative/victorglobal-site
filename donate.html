<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="The Victor Global Initiative empowers at-risk youth and foster children through military-grade discipline, professional mentorship, and emotional resilience training.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Global Initiative | Official Site</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" integrity="sha384-p86U60I6L8V6oD4R4uW4N4M4f4L4U4k4S4T4O4R4i4N4G4H4t4M4l4O4p4S4D4I" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="donation-page-wrapper">
        <div data-aos="fade-up">
            <h1 style="color:var(--primary); font-size: 2.8rem; margin-bottom: 15px;">A Victor, Not a Victim</h1>
            <p style="font-size: 1.1rem; color: #555; max-width: 700px; margin: 0 auto;">
                Your investment directly supports at-risk youth and foster children.
            </p>
        </div>

        <div class="donation-card" data-aos="zoom-in" data-aos-delay="200">
            <h2 style="margin-bottom: 20px; color: var(--dark);">Make Your Impact</h2>
            <p style="margin-bottom: 35px; color: #666;">Support our mission securely via Stripe checkout below.</p>
            
            <button onclick="openDonate()" class="donate-btn-large">
                Donate Now
            </button>

            <div style="margin-top: 30px; font-size: 0.85rem; color: #777;">
                <p>Victor Global Initiative is a 501(c)(3) nonprofit.</p>
                <div class="ein-badge">EIN: 41-3649085</div>
                <p style="margin-top: 15px;">
                    <a href="https://donate.stripe.com/14A00l3BiePw7zjeMgcZa00" target="_blank" style="color: var(--primary); text-decoration: underline;">
                        Trouble with the popup? Click here to donate directly.
                    </a>
                </p>
            </div>
        </div>
    </main>

    <div id="donateModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeDonate()">&times;</span>
            <iframe 
                id="stripe-iframe"
                src="https://donate.stripe.com/14A00l3BiePw7zjeMgcZa00" 
                width="100%" 
                height="100%" 
                frameborder="0"
                title="Stripe Donation Checkout">
            </iframe>
        </div>
    </div>

<div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" integrity="sha384-Z6H2Bsc1pntI9uH2uYy4K9iN6BfE9xR5TfI4H2B7kL7mB5l5h4T5o5p5Q5r5s5T" crossorigin="anonymous"></script>
    <script src="assets/js/scripts.js"></script>
</body>
</html>
