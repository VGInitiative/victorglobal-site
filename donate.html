<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate | Victor Global Initiative</title>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
</head>
<body>

    <div id="header-placeholder"></div>

    <main style="padding: 100px 20px; text-align: center;">
        <div data-aos="fade-up">
            <h1 style="color:var(--primary); font-size: 2.8rem; margin-bottom: 15px;">A Victor, Not a Victim</h1>
            <p style="font-size: 1.1rem; color: #555; max-width: 700px; margin: 0 auto 40px;">
                Your investment directly supports at-risk youth and foster children.
            </p>
        </div>

        <div class="donation-card" data-aos="zoom-in">
            <h2 style="margin-bottom: 20px;">Make Your Impact</h2>
            <p style="margin-bottom: 35px; color: #666;">Support our mission securely via Stripe checkout below.</p>
            
            <button onclick="openDonate()" class="donate-btn-large">
                Donate Now
            </button>

            <div style="margin-top: 30px; font-size: 0.85rem; color: #777;">
                <p>Victor Global Initiative is a 501(c)(3) nonprofit.</p>
                <div class="ein-badge">EIN: 41-3649085</div>
            </div>
        </div>
    </main>

    <div id="donateModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeDonate()">&times;</span>
            <iframe 
                src="https://donate.stripe.com/14A00l3BiePw7zjeMgcZa00" 
                width="100%" 
                height="100%" 
                frameborder="0"
                style="border-radius: 10px;">
            </iframe>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Modal Logic
        function openDonate() {
            document.getElementById('donateModal').style.display = "block";
            document.body.style.overflow = "hidden"; // Prevent background scroll
        }

        function closeDonate() {
            document.getElementById('donateModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        // Close modal if user clicks outside of the white box
        window.onclick = function(event) {
            let modal = document.getElementById('donateModal');
            if (event.target == modal) {
                closeDonate();
            }
        }

        // Component Loader
        async function loadComponents() {
            try {
                const header = await fetch('header.html');
                document.getElementById('header-placeholder').innerHTML = await header.text();
                const footer = await fetch('footer.html');
                document.getElementById('footer-placeholder').innerHTML = await footer.text();
                AOS.init({ duration: 1000, once: true });
            } catch (err) { console.error("Load failed:", err); }
        }

        window.onload = loadComponents;
    </script>
</body>
</html>
