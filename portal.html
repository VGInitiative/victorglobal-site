<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal | Victor Global Initiative</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .portal-wrapper { max-width: 600px; margin: 60px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); position: relative; z-index: 10; }
        .auth-card { display: none; }
        .auth-card.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; box-sizing: border-box; }
        
        .auth-toggle { margin-top: 25px; font-size: 0.9rem; text-align: center; color: #666; }
        .link-btn { background: none; border: none; color: var(--secondary); font-weight: 700; cursor: pointer; text-decoration: underline; font-family: inherit; }
        
        .dashboard-card { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 4px solid var(--secondary); margin-bottom: 20px; }
        .secret-code-display { font-size: 1.5rem; color: var(--secondary); font-weight: 700; border: 2px dashed var(--secondary); padding: 10px; display: inline-block; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="portal-wrapper" data-aos="fade-up">
            
            <div id="login-view" class="auth-card active">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--primary);">Candidate Login</h2>
                    <p>Access your scholarship mission deck.</p>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="cadet@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••">
                </div>
                <button id="submit-login" class="hero-btn" style="width: 100%; background: var(--primary);">Sign In</button>
                <div class="auth-toggle">
                    Don't have an account? <button id="go-to-register" class="link-btn">Register Now</button>
                </div>
            </div>

            <div id="register-view" class="auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--primary);">Join the Victor Cohort</h2>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="First & Last Name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="cadet@email.com">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="reg-pass" placeholder="Min. 8 characters">
                </div>
                <button id="submit-register" class="hero-btn" style="width: 100%; background: var(--secondary);">Create Account</button>
                <div class="auth-toggle">
                    Already have an account? <button id="go-to-login" class="link-btn">Sign In</button>
                </div>
            </div>

            <div id="dashboard-view" class="auth-card">
                <h3 id="user-welcome" style="color: var(--primary);">Welcome, Candidate</h3>
                <div class="dashboard-card">
                    <p style="font-size: 0.8rem; font-weight:600;">JROTC Instructor Code:</p>
                    <div id="display-secret-code" class="secret-code-display">VGI-XXXX</div>
                </div>
                <button id="btn-logout" class="hero-btn" style="width: 100%; background: #666;">Sign Out</button>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/scripts.js"></script>

    <script>
        // Centralized View Controller
        function switchView(viewId) {
            document.querySelectorAll('.auth-card').forEach(card => card.classList.remove('active'));
            const target = document.getElementById(viewId);
            if (target) target.classList.add('active');
        }

        // Wait for DOM to be fully loaded to attach listeners
        document.addEventListener('DOMContentLoaded', () => {
            
            // View Switching Listeners (Non-Inline)
            document.getElementById('go-to-register').addEventListener('click', () => switchView('register-view'));
            document.getElementById('go-to-login').addEventListener('click', () => switchView('login-view'));
            document.getElementById('btn-logout').addEventListener('click', () => location.reload());

            // Login Logic
            document.getElementById('submit-login').addEventListener('click', async () => {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-pass').value;

                if(!email || !password) return alert("Fields required.");

                try {
                    const response = await fetch('/api/LoginCandidate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await response.json();
                    if (data.authorized) {
                        document.getElementById('display-secret-code').innerText = data.secretCode;
                        switchView('dashboard-view');
                    } else {
                        alert(data.message || "Login failed.");
                    }
                } catch (err) {
                    alert("System Connection Error.");
                }
            });

            // Register Logic
            document.getElementById('submit-register').addEventListener('click', async () => {
                const fullName = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-pass').value;

                try {
                    const response = await fetch('/api/RegisterCandidate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fullName, email, password })
                    });
                    if (response.ok) {
                        alert("Account Secured. Please Sign In.");
                        switchView('login-view');
                    } else {
                        const d = await response.json();
                        alert(d.message);
                    }
                } catch (err) {
                    alert("Registration Error.");
                }
            });
        });
    </script>
</body>
</html>
