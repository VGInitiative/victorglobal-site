<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGI Candidate Portal</title>
    <style>
        :root { --primary: #0a7d8c; --secondary: #32c6a6; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .portal-box { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .view { display: none; }
        .view.active { display: block; }
        h2 { margin-top: 0; color: var(--primary); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: var(--secondary); color: white; }
        .toggle-text { text-align: center; margin-top: 15px; font-size: 14px; }
        .link { color: var(--secondary); cursor: pointer; text-decoration: underline; background: none; border: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="portal-box">
        <div id="login-view" class="view active">
            <h2>VGI Login</h2>
            <input type="email" id="l-email" placeholder="Email Address">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-main" id="do-login">Sign In</button>
            <div class="toggle-text">
                New? <button class="link" onclick="swap('register-view')">Register Now</button>
            </div>
        </div>

        <div id="register-view" class="view">
            <h2>VGI Register</h2>
            <input type="text" id="r-name" placeholder="Full Name">
            <input type="email" id="r-email" placeholder="Email Address">
            <input type="password" id="r-pass" placeholder="Password">
            <button class="btn-sub" id="do-register">Create Account</button>
            <div class="toggle-text">
                Member? <button class="link" onclick="swap('login-view')">Sign In</button>
            </div>
        </div>

        <div id="dashboard-view" class="view">
            <h2>Welcome Back</h2>
            <p style="text-align:center;">Your dashboard is active.</p>
            <button class="btn-main" onclick="location.reload()">Sign Out</button>
        </div>
    </div>

    <script>
        // Internal View Swapper
        function swap(id) {
            console.log("Navigating to: " + id);
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Action Handlers
        document.getElementById('do-login').onclick = function() {
            const email = document.getElementById('l-email').value;
            if(email) swap('dashboard-view');
            else alert("Enter email");
        };

        document.getElementById('do-register').onclick = function() {
            alert("Registration logic triggered!");
            swap('login-view');
        };
    </script>
</body>
</html>
