<!DOCTYPE html>
<html lang="en">
  <div style="background: var(--navy); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 600;">
    MISSION LOG: This portal is currently under construction. Authentication services are upcoming.
</div>  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal | Victor Global Initiative</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .portal-wrapper { max-width: 600px; margin: 60px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .auth-card { display: none; }
        .auth-card.active { display: block; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-toggle { margin-top: 25px; text-align: center; }
        .link-btn { background: none; border: none; color: var(--secondary); font-weight: 700; cursor: pointer; text-decoration: underline; font-family: inherit; }
        .dashboard-card { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 4px solid var(--secondary); margin-bottom: 20px; }
        .secret-code-display { font-size: 1.5rem; color: var(--secondary); font-weight: 700; border: 2px dashed var(--secondary); padding: 10px; display: inline-block; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="portal-wrapper">
            
            <div id="login-view" class="auth-card active">
                <h2 style="text-align: center; color: var(--primary);">Candidate Login</h2>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="cadet@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••">
                </div>
                <button id="submit-login" class="hero-btn" style="width: 100%; background: var(--primary);">Sign In</button>
                <div class="auth-toggle">
                    Don't have an account? <button id="go-to-register" class="link-btn">Register Now</button><br>
                    <button id="go-to-reset" class="link-btn" style="font-size: 0.8rem; opacity: 0.7;">Forgot Password?</button>
                </div>
            </div>

            <div id="register-view" class="auth-card">
                <h2 style="text-align: center; color: var(--primary);">Join the Cohort</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="First & Last Name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="cadet@email.com">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="reg-pass" placeholder="Min. 8 characters">
                </div>
                <button id="submit-register" class="hero-btn" style="width: 100%; background: var(--secondary);">Create Account</button>
                <div class="auth-toggle">
                    Already have an account? <button id="go-to-login" class="link-btn">Sign In</button>
                </div>
            </div>

            <div id="reset-view" class="auth-card">
                <h2 style="text-align: center; color: var(--primary);">Reset Password</h2>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" placeholder="Enter your email">
                </div>
                <button class="hero-btn" style="width: 100%; background: var(--primary);">Send Link</button>
                <div class="auth-toggle">
                    <button id="back-to-login" class="link-btn">Back to Login</button>
                </div>
            </div>

            <div id="dashboard-view" class="auth-card">
                <h3 style="color: var(--primary);">Candidate Dashboard</h3>
                <div class="dashboard-card">
                    <p style="font-size: 0.8rem; font-weight:600;">Instructor Code:</p>
                    <div id="display-secret-code" class="secret-code-display">VGI-XXXX</div>
                </div>
                <button id="btn-logout" class="hero-btn" style="width: 100%; background: #666;">Sign Out</button>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/assets/js/scripts.js"></script>
    <script src="/assets/js/portal.js"></script>
</body>
</html>
