<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal | Victor Global Initiative</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Victor Standard Portal Styling */
        .portal-wrapper { max-width: 600px; margin: 60px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .auth-card { display: none; }
        .auth-card.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; box-sizing: border-box; }
        
        .auth-toggle { margin-top: 25px; font-size: 0.9rem; text-align: center; color: #666; line-height: 1.6; }
        .auth-toggle button { background: none; border: none; color: var(--secondary); font-weight: 700; cursor: pointer; text-decoration: underline; font-family: inherit; font-size: 0.9rem; padding: 2px 5px; }
        
        .dashboard-card { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 4px solid var(--secondary); margin-bottom: 20px; }
        .secret-code-display { font-size: 1.5rem; color: var(--secondary); font-weight: 700; border: 2px dashed var(--secondary); padding: 10px; display: inline-block; margin: 10px 0; border-radius: 4px; background: #fff; }
        .upload-section { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .status-msg { font-size: 0.8rem; margin-top: 8px; font-weight: 600; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="portal-wrapper">
            
            <div id="login-view" class="auth-card active">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--primary);">Candidate Login</h2>
                    <p>Enter your credentials to access the mission.</p>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="cadet@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••">
                </div>
                <button type="button" onclick="portalLogin()" class="hero-btn" style="width: 100%; background: var(--primary);">Sign In</button>
                <div class="auth-toggle">
                    New here? <button type="button" onclick="switchView('register-view')">Register Now</button><br>
                    <button type="button" onclick="switchView('reset-view')" style="opacity: 0.7; font-size: 0.8rem;">Forgot Password?</button>
                </div>
            </div>

            <div id="register-view" class="auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--primary);">Candidate Registration</h2>
                    <p>Start your scholarship application journey.</p>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="cadet@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass" placeholder="Min. 8 characters">
                </div>
                <button type="button" onclick="portalRegister()" class="hero-btn" style="width: 100%; background: var(--secondary);">Create Account</button>
                <div class="auth-toggle">
                    Already a member? <button type="button" onclick="switchView('login-view')">Sign In</button>
                </div>
            </div>

            <div id="reset-view" class="auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: var(--primary);">Reset Password</h2>
                    <p>We will send a recovery link to your email.</p>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" placeholder="cadet@email.com">
                </div>
                <button type="button" class="hero-btn" style="width: 100%; background: var(--primary);">Send Link</button>
                <div class="auth-toggle">
                    <button type="button" onclick="switchView('login-view')">Back to Login</button>
                </div>
            </div>

            <div id="dashboard-view" class="auth-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3 style="margin: 0; color: var(--primary);">Your Mission Progress</h3>
                    <span id="app-status" style="background: #fff3cd; color: #856404; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">INCOMPLETE</span>
                </div>

                <div class="dashboard-card">
                    <p style="margin: 0; font-size: 0.85rem; font-weight: 600;">JROTC Instructor Code:</p>
                    <div id="display-secret-code" class="secret-code-display">VGI-XXXX</div>
                </div>

                <div class="upload-section">
                    <label style="font-weight: 700; font-size: 0.85rem; color: var(--primary);">Uniform Photo</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="file" id="photo-upload" style="font-size: 0.7rem;">
                        <button onclick="uploadFile('photo-upload', 'photo-status')" class="hero-btn" style="padding: 5px 15px; font-size: 0.7rem;">Upload</button>
                    </div>
                    <p id="photo-status" class="status-msg"></p>
                </div>

                <div class="upload-section">
                    <label style="font-weight: 700; font-size: 0.85rem; color: var(--primary);">Video Statement</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="file" id="video-upload" style="font-size: 0.7rem;">
                        <button onclick="uploadFile('video-upload', 'video-status')" class="hero-btn" style="padding: 5px 15px; font-size: 0.7rem;">Upload</button>
                    </div>
                    <p id="video-status" class="status-msg"></p>
                </div>

                <button onclick="location.reload()" style="width: 100%; margin-top: 20px; border: 1px solid #ddd; background: none; padding: 10px; border-radius: 50px; cursor: pointer;">Sign Out</button>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/scripts.js"></script>
    <script>
        // Fail-safe view switcher
        function switchView(viewId) {
            console.log("Switching to: " + viewId);
            const cards = document.querySelectorAll('.auth-card');
            cards.forEach(card => card.classList.remove('active'));
            
            const target = document.getElementById(viewId);
            if(target) {
                target.classList.add('active');
            } else {
                console.error("View ID not found: " + viewId);
            }
        }

        async function portalLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            if(!email || !password) return alert("All fields are required.");

            try {
                const response = await fetch('/api/LoginCandidate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok && data.authorized) {
                    document.getElementById('display-secret-code').innerText = data.secretCode;
                    document.getElementById('app-status').innerText = data.status;
                    switchView('dashboard-view');
                } else {
                    alert(data.message || "Login failed.");
                }
            } catch (err) {
                alert("Database connection error.");
            }
        }

        async function portalRegister() {
            const fullName = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;

            if(!fullName || !email || !password) return alert("All fields are required.");

            try {
                const response = await fetch('/api/RegisterCandidate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    alert("Account created. Please sign in.");
                    switchView('login-view');
                } else {
                    alert(data.message || "Registration failed.");
                }
            } catch (err) {
                alert("Server error. Please try again later.");
            }
        }
    </script>
</body>
</html>
