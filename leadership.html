<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership | Victor Global Initiative</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

    <style>
        /* --- MASTER CSS --- */
        :root {
            --primary: #0a7d8c; 
            --secondary: #32c6a6;
            --dark: #222;
            --light: #f4f7f8;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            line-height: 1.6; 
            color: var(--dark); 
            background: var(--white);
            overflow-x: hidden;
        }

        /* Nav & Footer Styles (Required in main page for injected content) */
        header { background: var(--primary); padding: 15px 0; position: sticky; top: 0; z-index: 2000; box-shadow: var(--shadow); }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; padding: 0 20px; }
        .brand { display: flex; align-items: center; text-decoration: none; color: white; }
        .logo { height: 50px; margin-right: 15px; }
        .org-title { font-size: 1.2rem; font-weight: 700; }
        nav { display: flex; align-items: center; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        nav a:hover, nav a.active-link { color: var(--secondary); }
        .donate-btn-nav { background: var(--secondary); padding: 8px 20px; border-radius: 50px; }
        .hamburger { display: none; font-size: 1.8rem; color: white; cursor: pointer; }

        /* Leadership Content Styles */
        .section-padding { padding: 80px 20px; max-width: 1200px; margin: auto; }
        .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; margin-top: 40px; }
        .board-card { background: var(--white); padding: 30px 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .board-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); border-color: var(--secondary); }
        .profile-frame { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 3px solid var(--secondary); overflow: hidden; }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }
        .role { color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 10px; }

        /* Footer Alignment */
        footer { background: #1a1a1a; color: #bbb; padding: 60px 20px 30px; font-size: 0.85rem; }
        .footer-container { max-width: 1100px; margin: 0 auto; }
        .footer-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; border-bottom: 1px solid #333; padding-bottom: 40px; text-align: left; }
        .footer-bottom { padding-top: 30px; text-align: center; }
        .legal-disclaimer { font-size: 0.7rem; color: #777; margin-top: 15px; }

        @media (max-width: 900px) {
            .hamburger { display: block; }
            nav { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; width: 100%; background: var(--primary); padding: 20px 0; text-align: center; }
            nav.active { display: flex; }
            nav a { margin: 10px 0; margin-left: 0; }
            .board-grid, .footer-top { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="section-padding">
        <div class="text-center" data-aos="fade-up">
            <h1 style="color:var(--primary); margin-bottom: 10px;">Guided by Integrity & Service</h1>
            <p style="margin-bottom: 40px;">Our dedicated board of directors and advisors.</p>
        </div>
        
        <div class="board-grid">
            <div class="board-card" data-aos="fade-up">
                <div class="profile-frame"><img src="assets/images/pierre.jpg" alt="Pierre-Richard Victor"></div>
                <h3>Pierre-Richard Victor</h3>
                <p class="role">Founder & President</p>
                <p style="font-size:0.9rem">pierre@victorglobal.org</p>
            </div>

            <div class="board-card" data-aos="fade-up" data-aos-delay="100">
                <div class="profile-frame"><img src="assets/images/joel.jpg" alt="Joel Garcia"></div>
                <h3>Joel Garcia</h3>
                <p class="role">Secretary</p>
                <p style="font-size:0.9rem">joel@victorglobal.org</p>
            </div>

            <div class="board-card" data-aos="fade-up" data-aos-delay="200">
                <div class="profile-frame"><img src="assets/images/mildred.jpg" alt="Mildred Burgos"></div>
                <h3>Mildred Burgos</h3>
                <p class="role">Treasurer</p>
                <p style="font-size:0.9rem">mildred@victorglobal.org</p>
            </div>

            <div class="board-card" data-aos="fade-up" data-aos-delay="300">
                <div class="profile-frame"><img src="assets/images/martine.jpg" alt="Martine Joseph"></div>
                <h3>Martine Joseph</h3>
                <p class="role">Trustee</p>
                <p style="font-size:0.9rem">martine@victorglobal.org</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        async function loadComponents() {
            try {
                // Fetch and inject Header
                const headerResp = await fetch('header.html');
                const headerHTML = await headerResp.text();
                document.getElementById('header-placeholder').innerHTML = headerHTML;
                
                // Fetch and inject Footer
                const footerResp = await fetch('footer.html');
                const footerHTML = await footerResp.text();
                document.getElementById('footer-placeholder').innerHTML = footerHTML;
                
                // Initialize AOS animations after content is ready
                AOS.init({ duration: 1000, once: true });

                // Highlight Active Link for Leadership
                const links = document.querySelectorAll('nav a');
                links.forEach(link => {
                    if(link.getAttribute('href') === 'leadership.html') {
                        link.classList.add('active-link');
                    }
                });

            } catch (err) {
                console.error("Component loading failed:", err);
            }
        }

        // Mobile Navigation Toggle
        function toggleMenu() {
            const nav = document.getElementById('nav-menu');
            if(nav) nav.classList.toggle('active');
        }

        // Initialize on Load
        window.onload = loadComponents;
    </script>
</body>
</html>
