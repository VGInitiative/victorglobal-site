<!DOCTYPE html>
<html lang="en">
<div id="header-placeholder"></div>

<main>
    <main>
        <section class="hero">
            <div class="hero-content" data-aos="fade-up">
                <h1 class="hero-title">A Victor, Not a Victim</h1>
                <p>Empowering the next generation to overcome their hardship.</p><br>
                <a href="#impact" class="hero-btn">See Our Impact</a>
            </div>
        </section>

        <section class="section-padding" id="impact">
            <h2 style="text-align: center; margin-bottom: 40px;">Our Real-World Impact</h2>
            <div class="grid">
                <div class="card" data-aos="fade-up">
                    <h3 class="counter" data-target="500">0</h3>
                    <p>Youth Reached</p>
                </div>
                <div class="card" data-aos="fade-up" data-aos-delay="100">
                    <h3 class="counter" data-target="25">0</h3>
                    <p>Community Partnerships</p>
                </div>
                <div class="card" data-aos="fade-up" data-aos-delay="200">
                    <h3 class="counter" data-target="12">0</h3>
                    <p>Programs Supported</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
        }

        // Counter Logic
        const counters = document.querySelectorAll('.counter');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    const counter = entry.target;
                    const target = +counter.getAttribute('data-target');
                    const update = () => {
                        const c = +counter.innerText;
                        const inc = target / 100;
                        if(c < target) {
                            counter.innerText = Math.ceil(c + inc);
                            setTimeout(update, 20);
                        } else { counter.innerText = target; }
                    };
                    update();
                    observer.unobserve(counter);
                }
            });
        }, { threshold: 0.5 });
        counters.forEach(c => observer.observe(c));
    </script>

<script>
    // Function to load external HTML into a placeholder
    function loadComponent(id, file) {
        fetch(file)
            .then(response => response.text())
            .then(data => {
                document.getElementById(id).innerHTML = data;
            })
            .catch(error => console.error('Error loading component:', error));
    }

    // Call the function for header and footer
    loadComponent('header-placeholder', 'header.html');
    loadComponent('footer-placeholder', 'footer.html');
</script>

</body>
</html>
