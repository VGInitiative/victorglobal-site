<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VGI Admin | Control Tower</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root { --primary: #003087; --secondary: #00A1E4; --light: #f4f7f9; --shadow: 0 4px 12px rgba(0,0,0,0.1); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; }
        .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .admin-card { background: white; padding: 30px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 30px; border-top: 5px solid var(--secondary); }
        
        /* Tab Styling */
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-link { padding: 12px 24px; cursor: pointer; font-weight: 700; color: var(--primary); border-radius: 8px; transition: 0.3s; border: none; background: none; }
        .tab-link.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .admin-group { margin-bottom: 20px; text-align: left; }
        .admin-group label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
        .admin-input, .admin-textarea, .admin-select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        .admin-textarea { height: 120px; resize: vertical; }
        
        .btn-save { background: var(--secondary); color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-save:hover { background: var(--primary); transform: translateY(-2px); }
        .save-status { margin-top: 15px; font-weight: 700; min-height: 20px; }
        
        .img-preview-container { display: flex; align-items: center; gap: 15px; margin-top: 10px; padding: 10px; background: var(--light); border-radius: 8px; }
        .img-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--secondary); }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

   </main>

    <div id="footer-placeholder"></div>

    <script>
        // 1. TAB NAVIGATION - Controls which card is visible
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].style.display = "none";
            }
            const links = document.getElementsByClassName("tab-link");
            for (let i = 0; i < links.length; i++) {
                links[i].classList.remove("active");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        // 2. IMAGE PREVIEW - Shows the photo before you upload
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = () => { preview.src = reader.result; }
            if (file) { reader.readAsDataURL(file); }
        }

        // 3. THE UNIVERSAL SAVE FUNCTION - The "Cargo Plane" for your data
        async function saveData(category) {
            const msg = document.getElementById('status-msg');
            msg.innerText = "🛰️ Connecting to VGI Cloud Vault...";
            msg.style.color = "#003087";

            const formData = new FormData();
            formData.append('type', category);

            // Pack the cargo based on which tab you are on
            if (category === 'impact') {
                formData.append('youth', document.getElementById('stat-youth').value);
                formData.append('news', document.getElementById('news-title').value);
            } else if (category === 'leadership') {
                formData.append('name', document.getElementById('board-name').value);
                formData.append('role', document.getElementById('board-role').value);
                formData.append('bio', document.getElementById('board-bio').value);
                const photo = document.getElementById('board-photo').files[0];
                if(photo) formData.append('image', photo);
            } else if (category === 'initiatives') {
                formData.append('title', document.getElementById('init-title').value);
                formData.append('desc', document.getElementById('init-desc').value);
                const photo = document.getElementById('init-photo').files[0];
                if(photo) formData.append('image', photo);
            }

            try {
                const response = await fetch('/api/UpdateSiteContent', {
                    method: 'POST',
                    body: formData // Note: No headers! FormData handles that.
                });

                if (response.ok) {
                    alert("✅ MISSION SUCCESS: The VGI Live Site has been updated!");
                    msg.innerText = "Update successful.";
                    msg.style.color = "#28a745";
                } else {
                    const errorMsg = await response.text();
                    alert("❌ VAULT REJECTION: " + response.status + " - " + errorMsg);
                }
            } catch (e) {
                alert("❌ OFFLINE: Could not reach the Azure API.");
                console.error("VGI Sync Error:", e);
            }
        }

        // 4. COMPONENT LOADER - Grabs your Header/Footer
        async function loadComponents() {
            try {
                const header = await fetch('header.html').then(r => r.text());
                const footer = await fetch('footer.html').then(r => r.text());
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
            } catch (err) { console.warn("Layout components loading..."); }
        }
        
        window.onload = loadComponents;
    </script>
</body>
</html>
