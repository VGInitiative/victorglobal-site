<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VGI Admin | Control Tower</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root { --primary: #003087; --secondary: #00A1E4; --light: #f4f7f9; --shadow: 0 4px 12px rgba(0,0,0,0.1); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; }
        .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; min-height: 600px; }
        .admin-card { background: white; padding: 30px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 30px; border-top: 5px solid var(--secondary); }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-link { padding: 12px 24px; cursor: pointer; font-weight: 700; color: var(--primary); border-radius: 8px; transition: 0.3s; border: none; background: none; }
        .tab-link.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-group { margin-bottom: 20px; text-align: left; }
        .admin-group label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
        .admin-input, .admin-textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: var(--secondary); color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; }
        .save-status { margin-top: 15px; font-weight: 700; }
        .img-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--secondary); margin-top: 10px; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="admin-container">
        <h1 style="color: var(--primary);">VGI Control Tower</h1>
        <p>Managed environment for the Victor Global Initiative.</p>

        <div class="tab-menu">
            <button class="tab-link active" onclick="openTab(event, 'impact')">Impact & News</button>
            <button class="tab-link" onclick="openTab(event, 'board')">Board Members</button>
        </div>

        <section id="impact" class="tab-content active">
            <div class="admin-card">
                <h3>📈 Global Impact Stats</h3>
                <div class="admin-group">
                    <label>Youth Reached</label>
                    <input type="number" id="stat-youth" class="admin-input" value="5">
                </div>
                <div class="admin-group">
                    <label>Latest News Headline</label>
                    <input type="text" id="news-title" class="admin-input" placeholder="e.g. New Program Launched">
                </div>
                <button class="btn-save" onclick="saveData('impact')">Update Live Site</button>
            </div>
        </section>

        <section id="board" class="tab-content">
            <div class="admin-card">
                <h3>👥 Board Member Management</h3>
                <div class="admin-group">
                    <label>Full Name</label>
                    <input type="text" id="board-name" class="admin-input">
                </div>
                <div class="admin-group">
                    <label>Profile Image</label>
                    <input type="file" id="board-photo" class="admin-input" accept="image/*" onchange="previewImage(this, 'board-preview')">
                    <img id="board-preview" src="" class="img-preview" style="display:none;">
                </div>
                <button class="btn-save" onclick="saveData('leadership')">Save Board Member</button>
            </div>
        </section>

        <div id="status-msg" class="save-status"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // TAB LOGIC
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
            tablinks = document.getElementsByClassName("tab-link");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        // PREVIEW LOGIC
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = () => { 
                preview.src = reader.result; 
                preview.style.display = "block";
            }
            if (file) { reader.readAsDataURL(file); }
        }

        // SAVE LOGIC
        async function saveData(category) {
            const msg = document.getElementById('status-msg');
            msg.innerText = "🛰️ Connecting to VGI Cloud Vault...";
            
            const formData = new FormData();
            formData.append('type', category);

            if (category === 'impact') {
                formData.append('youth', document.getElementById('stat-youth').value);
                formData.append('news', document.getElementById('news-title').value);
            } else if (category === 'leadership') {
                formData.append('name', document.getElementById('board-name').value);
                const photo = document.getElementById('board-photo').files[0];
                if(photo) formData.append('image', photo);
            }

            try {
                const response = await fetch('/api/UpdateSiteContent', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("✅ SUCCESS: Live Site Updated!");
                    msg.innerText = "Sync Complete.";
                } else {
                    alert("❌ ERROR: Azure rejected the update.");
                }
            } catch (e) {
                alert("❌ OFFLINE: Could not reach API.");
            }
        }

        // LOADER
        async function loadComponents() {
            try {
                const header = await fetch('header.html').then(r => r.text());
                const footer = await fetch('footer.html').then(r => r.text());
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
            } catch (err) { console.warn("Layout syncing..."); }
        }
        window.onload = loadComponents;
    </script>
</body>
</html>
