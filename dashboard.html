<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VGI | Executive Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .dash-container { max-width: 1200px; margin: 40px auto; padding: 20px; text-align: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow); border-bottom: 5px solid var(--secondary); }
        .stat-number { font-size: 3.5rem; font-weight: 800; color: var(--primary); display: block; }
        .stat-label { font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        .activity-feed { background: white; border-radius: 20px; padding: 30px; margin-top: 40px; text-align: left; box-shadow: var(--shadow); }
        .feed-item { display: flex; align-items: center; gap: 20px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .feed-img { width: 100px; height: 70px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="dash-container">
        <h1 style="color: var(--primary);">VGI Executive Insights</h1>
        <p>Real-time mission metrics and program visibility.</p>

        <div class="grid-3">
            <div class="stat-card">
                <span class="stat-number" id="dash-youth">--</span>
                <span class="stat-label">Youth Empowered</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="dash-partners">--</span>
                <span class="stat-label">Active Partnerships</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="dash-programs">--</span>
                <span class="stat-label">Global Initiatives</span>
            </div>
        </div>

        <div class="activity-feed">
            <h3>📸 Recent Programs in Action</h3>
            <div id="action-gallery-feed">
                <p style="color:#999;">Fetching latest field reports...</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        async function loadLiveDashboard() {
            try {
                // 1. Fetching from your Azure Function (Read Mode)
                const response = await fetch('/api/GetSiteContent');
                const data = await response.json();

                // 2. Update Stats
                document.getElementById('dash-youth').innerText = data.stats.youthCount || "5";
                document.getElementById('dash-partners').innerText = data.stats.partnerCount || "2";
                document.getElementById('dash-programs').innerText = data.stats.programCount || "3";

                // 3. Update Gallery Feed
                const gallery = document.getElementById('action-gallery-feed');
                gallery.innerHTML = data.gallery.map(item => `
                    <div class="feed-item">
                        <img src="${item.imageUrl}" class="feed-img">
                        <div>
                            <strong>${item.title}</strong><br>
                            <small>${item.date} — Mentorship update</small>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.warn("Dashboard sync offline. Showing cached data.");
            }
        }

        window.onload = () => {
            loadLiveDashboard();
            // Optional: Re-fetch every 5 minutes to keep it "Live"
            setInterval(loadLiveDashboard, 300000);
        };
    </script>
</body>
</html>
